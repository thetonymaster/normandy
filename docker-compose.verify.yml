# docker-compose.verify.yml — ephemeral Postgres + Redis for the 1.0.0 e2e bug hunt.
# Brought up only for the verification pass; torn down after. Ports match config/test.exs.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: normandy_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral; no volume to clean up

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
